<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace">
  <defs>
    <linearGradient id="wm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7ee7c7"/>
      <stop offset="0.55" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
    <radialGradient id="sweep" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7ee7c7" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7ee7c7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow" cx="0.5" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#16324a" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="1.1"/></filter>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes ping { 0%{ r:3; opacity:1 } 60%{ opacity:.9 } 100%{ r:16; opacity:0 } }
      @keyframes lite { 0%,100%{ opacity:.35 } 50%{ opacity:1 } }
      @keyframes dash { to { stroke-dashoffset:-24; } }
      @keyframes rise { 0%{ opacity:0; transform:translateY(10px) } 100%{ opacity:1; transform:translateY(0) } }
      .radar { transform-origin: 175px 140px; animation: spin 5.5s linear infinite; }
      .node  { animation: lite 3.2s ease-in-out infinite; }
      .edge  { stroke-dasharray:5 5; animation: dash 1.4s linear infinite; }
      .pulse { fill:#7ee7c7; animation: ping 3.2s ease-out infinite; }
      .fadein{ animation: rise .9s ease-out both; }
    </style>
  </defs>

  <rect width="900" height="280" rx="16" fill="#0d1117"/>
  <rect width="900" height="280" rx="16" fill="url(#bgGlow)"/>

  <!-- radar / node-graph scout motif (left) -->
  <g>
    <circle cx="175" cy="140" r="118" fill="none" stroke="#1f2a37" stroke-width="1"/>
    <circle cx="175" cy="140" r="82"  fill="none" stroke="#1f2a37" stroke-width="1"/>
    <circle cx="175" cy="140" r="44"  fill="none" stroke="#1f2a37" stroke-width="1"/>
    <line x1="57" y1="140" x2="293" y2="140" stroke="#1f2a37"/>
    <line x1="175" y1="22" x2="175" y2="258" stroke="#1f2a37"/>

    <!-- rotating sweep -->
    <g class="radar">
      <path d="M175 140 L175 22 A118 118 0 0 1 280 82 Z" fill="url(#sweep)"/>
      <line x1="175" y1="140" x2="175" y2="22" stroke="#7ee7c7" stroke-width="2" opacity="0.85"/>
    </g>

    <!-- edges -->
    <g stroke="#3a4a5c" stroke-width="1.4" class="edge">
      <line x1="175" y1="140" x2="118" y2="86"/>
      <line x1="175" y1="140" x2="242" y2="96"/>
      <line x1="175" y1="140" x2="110" y2="196"/>
      <line x1="175" y1="140" x2="235" y2="192"/>
      <line x1="118" y1="86"  x2="242" y2="96"/>
    </g>

    <!-- nodes -->
    <g>
      <circle cx="175" cy="140" r="7" fill="#7ee7c7"/>
      <circle class="pulse" cx="175" cy="140"/>
      <circle class="node" cx="118" cy="86"  r="5" fill="#a5b4fc" style="animation-delay:.2s"/>
      <circle class="node" cx="242" cy="96"  r="5" fill="#a5b4fc" style="animation-delay:.8s"/>
      <circle class="node" cx="110" cy="196" r="5" fill="#c4b5fd" style="animation-delay:1.3s"/>
      <circle class="node" cx="235" cy="192" r="5" fill="#c4b5fd" style="animation-delay:1.9s"/>
      <circle class="node" cx="286" cy="140" r="4" fill="#7ee7c7" style="animation-delay:.5s"/>
      <circle class="node" cx="64"  cy="140" r="4" fill="#7ee7c7" style="animation-delay:1.1s"/>
    </g>
  </g>

  <!-- wordmark + tagline (right) -->
  <g class="fadein">
    <text x="360" y="118" font-size="66" font-weight="800" fill="url(#wm)" letter-spacing="-2">graphscout</text>
    <rect x="362" y="132" width="470" height="2.5" rx="1.25" fill="url(#wm)" opacity="0.5"/>
    <text x="362" y="168" font-size="17" fill="#c9d1d9" font-weight="600">Query code structure — don't read whole files.</text>
    <text x="362" y="196" font-size="13.5" fill="#8b949e">One call → verbatim source + call edges + blast radius.</text>
    <g font-size="12" font-weight="600">
      <rect x="362" y="214" width="118" height="26" rx="13" fill="#132a22" stroke="#1f4d3d"/>
      <text x="421" y="231" text-anchor="middle" fill="#7ee7c7">⚡ cached + incremental</text>
      <rect x="490" y="214" width="96" height="26" rx="13" fill="#1a1f3a" stroke="#2d3566"/>
      <text x="538" y="231" text-anchor="middle" fill="#a5b4fc">🔒 zero API keys</text>
      <rect x="596" y="214" width="104" height="26" rx="13" fill="#241f3a" stroke="#3d2d66"/>
      <text x="648" y="231" text-anchor="middle" fill="#c4b5fd">🔌 CLI + MCP</text>
    </g>
  </g>
</svg>
