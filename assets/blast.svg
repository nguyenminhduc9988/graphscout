<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="900" height="340" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace">
  <defs>
    <radialGradient id="bg2" cx="0.3" cy="0.4" r="0.8">
      <stop offset="0" stop-color="#1a1420" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <style>
      /* one 6s loop: change source -> depth1 -> depth2 ripple */
      @keyframes src   { 0%{ fill:#c9d1d9 } 8%{ fill:#ff6b6b } 92%{ fill:#ff6b6b } 100%{ fill:#c9d1d9 } }
      @keyframes ring  { 0%,6%{ r:9; opacity:.9 } 40%{ r:150; opacity:0 } 100%{ r:150; opacity:0 } }
      @keyframes d1    { 0%,22%{ fill:#2b333d; stroke:#3a4653 } 30%{ fill:#f0a500; stroke:#ffbd2e } 92%{ fill:#f0a500; stroke:#ffbd2e } 100%{ fill:#2b333d; stroke:#3a4653 } }
      @keyframes d2    { 0%,45%{ fill:#2b333d; stroke:#3a4653 } 55%{ fill:#8b7cf6; stroke:#a5b4fc } 92%{ fill:#8b7cf6; stroke:#a5b4fc } 100%{ fill:#2b333d; stroke:#3a4653 } }
      @keyframes elit  { 0%,24%{ stroke:#26303a } 34%{ stroke:#ffbd2e } 92%{ stroke:#ffbd2e } 100%{ stroke:#26303a } }
      @keyframes elit2 { 0%,48%{ stroke:#26303a } 58%{ stroke:#a5b4fc } 92%{ stroke:#a5b4fc } 100%{ stroke:#26303a } }
      @keyframes cap   { 0%,20%{ opacity:0 } 32%{ opacity:1 } 100%{ opacity:1 } }
      @keyframes cap2  { 0%,44%{ opacity:0 } 56%{ opacity:1 } 100%{ opacity:1 } }
      .src   { animation: src 6s ease-in-out infinite; }
      .ripple{ animation: ring 6s ease-out infinite; fill:none; stroke:#ff6b6b; stroke-width:2; }
      .n1    { animation: d1 6s ease-in-out infinite; }
      .n2    { animation: d2 6s ease-in-out infinite; }
      .e1    { animation: elit 6s ease-in-out infinite; }
      .e2    { animation: elit2 6s ease-in-out infinite; }
      .lab1  { animation: cap 6s ease-in-out infinite; }
      .lab2  { animation: cap2 6s ease-in-out infinite; }
      .lbl   { font-size:11px; fill:#c9d1d9; font-weight:600; }
      .cap   { font-size:12px; font-weight:700; }
    </style>
  </defs>

  <rect width="900" height="340" rx="14" fill="#0d1117" stroke="#30363d"/>
  <rect width="900" height="340" rx="14" fill="url(#bg2)"/>
  <text x="28" y="34" font-size="14" font-weight="700" fill="#f0f6fc">graphscout impact  <tspan fill="#ff6b6b">parse_config</tspan>  --depth=2</text>
  <text x="28" y="54" font-size="11.5" fill="#8b949e">the real blast radius of a change — bidirectional BFS over the call graph, not a one-hop guess</text>

  <!-- edges: depth-2 first (drawn under), then depth-1 -->
  <g stroke-width="2" fill="none">
    <!-- depth2 edges -->
    <path class="e2" d="M470 190 L300 96"/>
    <path class="e2" d="M470 190 L660 250"/>
    <path class="e2" d="M470 190 L285 268"/>
    <path class="e2" d="M660 118 L790 92"/>
    <path class="e2" d="M660 118 L800 190"/>
    <path class="e2" d="M310 210 L165 178"/>
    <!-- depth1 edges from source -->
    <path class="e1" d="M470 190 L660 118"/>
    <path class="e1" d="M470 190 L310 210"/>
    <path class="e1" d="M470 190 L520 300"/>
  </g>

  <!-- depth-2 nodes -->
  <g stroke-width="1.5">
    <circle class="n2" cx="300" cy="96"  r="16"/>
    <circle class="n2" cx="660" cy="250" r="16"/>
    <circle class="n2" cx="285" cy="268" r="16"/>
    <circle class="n2" cx="790" cy="92"  r="16"/>
    <circle class="n2" cx="800" cy="190" r="16"/>
    <circle class="n2" cx="165" cy="178" r="16"/>
  </g>
  <!-- depth-1 nodes -->
  <g stroke-width="1.5">
    <circle class="n1" cx="660" cy="118" r="20"/>
    <circle class="n1" cx="310" cy="210" r="20"/>
    <circle class="n1" cx="520" cy="300" r="20"/>
  </g>

  <!-- source node + ripple -->
  <circle class="ripple" cx="470" cy="190"/>
  <circle class="src" cx="470" cy="190" r="26" stroke="#ff8787" stroke-width="2"/>
  <text x="470" y="194" text-anchor="middle" class="lbl" fill="#0d1117">parse_</text>

  <!-- node labels -->
  <g fill="#c9d1d9" font-size="10.5" text-anchor="middle">
    <text x="660" y="122">load_cfg</text>
    <text x="310" y="214">validate</text>
    <text x="520" y="304">merge</text>
    <text x="300" y="100" opacity="0.85">schema</text>
    <text x="660" y="254" opacity="0.85">reload</text>
    <text x="285" y="272" opacity="0.85">defaults</text>
    <text x="790" y="96" opacity="0.85">Env</text>
    <text x="800" y="194" opacity="0.85">CLI</text>
    <text x="165" y="182" opacity="0.85">strict</text>
  </g>

  <!-- legend / captions -->
  <g>
    <circle cx="620" cy="308" r="6" fill="#ff6b6b"/>
    <text x="632" y="312" class="cap" fill="#ff8787">you change this</text>
    <circle class="lab1" cx="742" cy="308" r="6" fill="#f0a500"/>
    <text class="lab1 cap" x="754" y="312" fill="#ffbd2e">depth 1</text>
    <circle class="lab2" cx="820" cy="308" r="6" fill="#8b7cf6"/>
    <text class="lab2 cap" x="832" y="312" fill="#a5b4fc">depth 2</text>
  </g>
</svg>
